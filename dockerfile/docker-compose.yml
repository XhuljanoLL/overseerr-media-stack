## Created by Xhuljano Llapushi - xhu_95@hotmail.it
## Media stack for Windows using Docker Compose
## Active services: Pulsarr, Jellyfin, Prowlarr, Sonarr, Radarr, FlareSolverr, and qBittorrent
## Optional services are kept in the separate file and are currently disabled
## Update the Windows bind mount paths before starting the stack

name: streaming-services

x-common-env: &common-env
  PUID: ${PUID}
  PGID: ${PGID}
  TZ: ${TZ}

networks:
  streaming-stuff:
    driver: bridge

services:
  ##===================================##
  pulsarr:
    image: lakker/pulsarr:latest
    container_name: pulsarr
    environment:
      <<: *common-env
    ports:
      - "${PULSARR_PORT:-3003}:3003"
    volumes:
      -  P:\Pulsarr\data:/app/data
    restart: unless-stopped
    networks:
      - streaming-stuff
  ##===================================##
  jellyfin:
    image: jellyfin/jellyfin
    container_name: jellyfin
    environment:
      <<: *common-env
      # - JELLYFIN_PublishedServerUrl=http://192.168.0.47      # Optional - may be necessary for docker healthcheck to pass if running in host network mode
    ports:
      - "${JELLYFIN_HTTP_PORT:-8096}:8096/tcp"
      - "${JELLYFIN_DISCOVERY_PORT:-7359}:7359/udp"
    volumes:
      # Jellyfin internal data
      - P:\Jellyfin\Config:/config
      - P:\Jellyfin\Cache:/cache

      # Media libraries
      - P:\Sonarr\tvshows:/data/tvshows
      - P:\Radarr\Movies:/data/movies
      - P:\Lidarr\Music:/data/musicfolder
      - P:\Readarr\Books:/data/books
    restart: 'unless-stopped'
    extra_hosts:
      - 'host.docker.internal:host-gateway'                 # Optional - alternative address used for autodiscovery
  ##===================================##
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    environment:
      <<: *common-env
    volumes:
      - P:\Prowlarr\Config:/config                ## CHANGE THIS ##
      - P:\Prowlarr\Backup:/data/Backup           ## CHANGE THIS ##
      - P:\Downloads:/data/downloads              ## CHANGE THIS ##
    ports:
      - "${PROWLARR_PORT:-9696}:9696"
    restart: unless-stopped
    networks:
      - streaming-stuff
  ##===================================##
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      <<: *common-env
    volumes:
      - P:\Sonarr\Config:/config                ## CHANGE THIS ##
      - P:\Sonarr\Backup:/data/Backup           ## CHANGE THIS ##
      - P:\Sonarr\tvshows:/data/tvshows         ## CHANGE THIS ##
      - P:\Downloads:/data/downloads            ## CHANGE THIS ##
    ports:
      - "${SONARR_PORT:-8989}:8989"
    restart: unless-stopped
    networks:
      - streaming-stuff
  ##===================================##
  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    environment:
      <<: *common-env
    volumes:
      - P:\Radarr\Config:/config                ## CHANGE THIS ##
      - P:\Radarr\Movies:/data/movies           ## CHANGE THIS ##
      - P:\Downloads:/data/downloads            ## CHANGE THIS ##
      - P:\Radarr\Backup:/data/Backup           ## CHANGE THIS ##
    ports:
      - "${RADARR_PORT:-7878}:7878"
    restart: unless-stopped
    networks:
      - streaming-stuff
  ##===================================##
  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    environment:
      <<: *common-env
      LOG_LEVEL: ${LOG_LEVEL}
      LOG_HTML: ${LOG_HTML}
      CAPTCHA_SOLVER: ${CAPTCHA_SOLVER}
    ports:
      - "${FLARESOLVERR_PORT:-8191}:8191"
    restart: unless-stopped
    networks:
      - streaming-stuff
  ##===================================##
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    environment:
      <<: *common-env
      WEBUI_PORT: ${QBITTORRENT_WEBUI_PORT}
    ports:
      - "${QBITTORRENT_PORT:-8088}:8080"
    volumes:
      - P:\qbittorrent\config:/config           ## CHANGE THIS ##
      - P:\Downloads:/downloads                 ## CHANGE THIS ##
    restart: unless-stopped
    networks:
      - streaming-stuff