## Created by Xhuljano Llapushi - xhu_95@hotmail.it
## Media stack for Windows using Docker Compose
## Active services: Pulsarr, Prowlarr, Sonarr, Radarr, FlareSolverr, and qBittorrent
## Optional services are kept in the separate file and are currently disabled
## Update the Windows bind mount paths before starting the stack

name: streaming-services

x-common-env: &common-env
  PUID: ${PUID}
  PGID: ${PGID}
  TZ: ${TZ}

networks:
  streaming-stuff:
    driver: bridge

services:
  ##===================================##
  pulsarr:
    image: lakker/pulsarr:latest
    container_name: pulsarr
    environment:
      <<: *common-env
    ports:
      - "${PULSARR_PORT:-3003}:3003"
    volumes:
      -  P:\Pulsarr\data:/app/data
    restart: unless-stopped
    networks:
      - streaming-stuff
  ##===================================##
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    environment:
      <<: *common-env
    volumes:
      - P:\Prowlarr\Config:/config                ## CHANGE THIS ##
      - P:\Prowlarr\Backup:/data/Backup           ## CHANGE THIS ##
      - P:\Downloads:/data/downloads              ## CHANGE THIS ##
    ports:
      - "${PROWLARR_PORT:-9696}:9696"
    restart: unless-stopped
    networks:
      - streaming-stuff
  ##===================================##
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      <<: *common-env
    volumes:
      - P:\Sonarr\Config:/config                ## CHANGE THIS ##
      - P:\Sonarr\Backup:/data/Backup           ## CHANGE THIS ##
      - P:\Sonarr\tvshows:/data/tvshows         ## CHANGE THIS ##
      - P:\Downloads:/data/downloads            ## CHANGE THIS ##
    ports:
      - "${SONARR_PORT:-8989}:8989"
    restart: unless-stopped
    networks:
      - streaming-stuff
  ##===================================##
  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    environment:
      <<: *common-env
    volumes:
      - P:\Radarr\Config:/config                ## CHANGE THIS ##
      - P:\Radarr\Movies:/data/movies           ## CHANGE THIS ##
      - P:\Downloads:/data/downloads            ## CHANGE THIS ##
      - P:\Radarr\Backup:/data/Backup           ## CHANGE THIS ##
    ports:
      - "${RADARR_PORT:-7878}:7878"
    restart: unless-stopped
    networks:
      - streaming-stuff
  ##===================================##
  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    environment:
      <<: *common-env
      LOG_LEVEL: ${LOG_LEVEL}
      LOG_HTML: ${LOG_HTML}
      CAPTCHA_SOLVER: ${CAPTCHA_SOLVER}
    ports:
      - "${FLARESOLVERR_PORT:-8191}:8191"
    restart: unless-stopped
    networks:
      - streaming-stuff
  ##===================================##
  tdarr:
    image: ghcr.io/haveagitgat/tdarr:latest
    container_name: tdarr
    environment:
      <<: *common-env
      UMASK_SET: ${TDARR_UMASK_SET:-002}
      serverIP: ${TDARR_SERVER_IP:-0.0.0.0}
      serverPort: ${TDARR_SERVER_PORT:-8266}
      webUIPort: ${TDARR_WEBUI_PORT:-8265}
      internalNode: ${TDARR_INTERNAL_NODE:-true}
      nodeID: ${TDARR_NODE_ID:-tdarr}
      nodeIP: ${TDARR_NODE_IP:-0.0.0.0}
      nodePort: ${TDARR_NODE_PORT:-8267}
    ports:
      - "${TDARR_WEBUI_PORT:-8265}:8265"
      - "${TDARR_SERVER_PORT:-8266}:8266"
    volumes:
      - P:\Tdarr\server:/app/server
      - P:\Tdarr\temp:/temp
      - P:\Sonarr\tvshows:/media/tvshows
      - P:\Radarr\Movies:/media/movies
      - P:\Downloads:/media/downloads
    restart: unless-stopped
    networks:
      - streaming-stuff
  ##===================================##
  tdarr-node:
    image: ghcr.io/haveagitgat/tdarr_node:latest
    container_name: tdarr-node
    environment:
      <<: *common-env
      UMASK_SET: ${TDARR_UMASK_SET:-002}
      nodeID: ${TDARR_NODE_ID:-Node-1}
      serverIP: tdarr
      serverPort: ${TDARR_SERVER_PORT:-8266}
      nodeName: ${TDARR_NODE_NAME:-Node-1}
      nodeIP: ${TDARR_NODE_IP:-0.0.0.0}
      nodePort: ${TDARR_NODE_PORT:-8267}
      GPU: ${TDARR_GPU:-false}
      NVIDIA_VISIBLE_DEVICES: ${TDARR_NVIDIA_VISIBLE_DEVICES:-all}
      NVIDIA_DRIVER_CAPABILITIES: ${TDARR_NVIDIA_DRIVER_CAPABILITIES:-compute,utility}
    ports:
      - "${TDARR_NODE_PORT:-8267}:8267"
    volumes:
      - P:\Tdarr\node:/app/configs
      - P:\Tdarr\temp:/temp
      - P:\Sonarr\tvshows:/media/tvshows
      - P:\Radarr\Movies:/media/movies
      - P:\Downloads:/media/downloads
    restart: unless-stopped
    networks:
      - streaming-stuff
  ##===================================##
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    environment:
      <<: *common-env
      WEBUI_PORT: ${QBITTORRENT_WEBUI_PORT}
    ports:
      - "${QBITTORRENT_PORT:-8088}:8080"
    volumes:
      - P:\qbittorrent\config:/config           ## CHANGE THIS ##
      - P:\Downloads:/downloads                 ## CHANGE THIS ##
    restart: unless-stopped
    networks:
      - streaming-stuff